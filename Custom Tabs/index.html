<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Tabs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tabs-container">

    <div class="tabs">
      <button class="tab-btn active" data-tab="1">Tab 1</button>
      <button class="tab-btn" data-tab="2">Tab 2</button>
      <button class="tab-btn" data-tab="3">Tab 3</button>
    </div>

    <div id="tab-1" class="content active">
      <h3>Tab 1 Content</h3>
      <p>This is content for Tab 1.</p>
    </div>

    <div id="tab-2" class="content">
      <h3>Tab 2 Content</h3>
      <p>This is content for Tab 2.</p>
    </div>

    <div id="tab-3" class="content">
      <h3>Tab 3 Content</h3>
      <p>This is content for Tab 3.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
