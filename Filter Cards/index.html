<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Filter Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Filter Cards</h2>

  <div class="buttons">
    <button class="filter-btn active" data-category="all">All</button>
    <button class="filter-btn" data-category="js">JavaScript</button>
    <button class="filter-btn" data-category="python">Python</button>
  </div>

  <div class="card-container">
    <div class="card" data-category="js">JavaScript 1</div>
    <div class="card" data-category="js">JavaScript 2</div>
    <div class="card" data-category="python">Python 1</div>
    <div class="card" data-category="python">Python 2</div>
    <div class="card" data-category="js">JavaScript 3</div>
    <div class="card" data-category="python">Python 3</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
